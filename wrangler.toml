# Cloudflare Pages config for `aish-design`.
# Bindings declared here are picked up by `wrangler pages dev` for local
# development. For the live Pages project, the SAME bindings must also be
# configured in the Cloudflare dashboard under Pages → aish-design → Settings.

name = "aish-design"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
APP_NAME = "Aishwin Design"

[[d1_databases]]
binding = "DB"
database_name = "aish-design"
database_id = "14743729-b034-40dc-bd62-946a63e2a3e8"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "aish-design-artifacts"

[[kv_namespaces]]
binding = "CACHE"
id = "de1437746b5a4a19b054ad06b2362e21"

# Secrets, set in the Cloudflare dashboard (Pages → aish-design → Settings → Environment variables → Encrypted):
#   APP_PASSWORD       shared bearer to access the app
#   SESSION_SECRET     random string used to sign session cookies
